<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Golden Sip</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <img
        src="images/GS_Logo-removebg.png"
        alt="Golden Sip Logo"
        class="logo"
      />
      <div class="message">
        <p>We are currently working on our new website</p>
      </div>

      <div class="form-container">
        <form method="post">
          <div class="email">
            <input
              type="email"
              name="email"
              id="email"
              placeholder="Enter your email"
            />
          </div>
          <button type="submit" class="notify-me">Notify me</button>
        </form>
      </div>
    </div>
  </body>
</html>
