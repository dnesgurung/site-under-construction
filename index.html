<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Golden Sip</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <img
        src="images/GS_Logo-removebg.png"
        alt="Golden Sip Logo"
        class="logo"
      />
      <div class="message">
        <p>We are currently working on our new website</p>
      </div>

      <div class="form-container">
        <form id="notifyForm" method="post">
          <div class="email">
            <input
              type="email"
              name="email"
              id="email"
              placeholder="Enter your email"
              required
              autocomplete="off"
            />
          </div>
          <button type="submit" class="notify-me">Notify me</button>
        </form>
        <div id="thankYouMessage" class="thank-you-message"></div>
      </div>

      <div class="socials-container">
        <div class="instagram">
          <a
            href="https://www.instagram.com/golden_sip/?hl=en"
            target="_blank"
            rel="noopener"
            aria-label="Golden Sip Instagram"
          >
            <img src="./images/Instagram_Icon.png" alt="instagram-logo" />
          </a>
        </div>
        <div class="facebook">
            <a href="https://www.facebook.com/GoldenSipRestaurant/"
            target="_blank"
            rel="noopener"
            aria-label="Golden Sip Facebook"
            >
            <img src="./images/facebook_icon.ico" alt="facebook_icon" />
        </a>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
